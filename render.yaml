services:
  - type: web
    name: mrability-finance
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mrability-db
          property: connectionString

databases:
  - name: mrability-db
    plan: free
    databaseName: mrability
